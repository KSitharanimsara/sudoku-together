<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sudoku Together</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a0a0a;--surface:#2a1010;--surface2:#3a1515;--border:#4a1a1a;--red:#ff4444;--pink:#ff8888;--text:#f0e0e0;--text2:#c0a0a0;--given:#e0d0d0;--green:#44ff88;--yellow:#ffcc44}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
#splash{align-items:center;justify-content:center;text-align:center;padding:20px}
#splash h1{font-size:2.2em;color:var(--red);margin-bottom:8px;text-shadow:0 0 30px rgba(255,68,68,.4)}
#splash p{color:var(--text2);margin-bottom:30px;font-size:1.1em}
.btn{background:var(--red);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:1.1em;cursor:pointer;font-weight:600;transition:all .2s}
.btn:hover{background:#ff6666;transform:scale(1.03)}.btn:active{transform:scale(.97)}
.btn-outline{background:transparent;border:2px solid var(--red);color:var(--red)}.btn-outline:hover{background:rgba(255,68,68,.1)}
.btn-sm{padding:8px 16px;font-size:.9em}
#name-select{align-items:center;justify-content:center;padding:20px;text-align:center;flex:1}
#name-select h2{color:var(--red);margin-bottom:8px;font-size:1.6em}
#name-select p{color:var(--text2);margin-bottom:24px}
.name-btns{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;width:100%;max-width:280px}
.name-btn{padding:16px;border-radius:14px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:1.1em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.name-btn:hover{border-color:var(--red);background:var(--surface2)}
.dot{width:14px;height:14px;border-radius:50%}.dot-red{background:var(--red)}.dot-pink{background:var(--pink)}
.join-row{display:flex;gap:8px;width:100%;max-width:280px;margin-bottom:16px}
.join-row input{flex:1;padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:1.1em;text-align:center;text-transform:uppercase;letter-spacing:3px}
.join-row input:focus{outline:none;border-color:var(--red)}
#game{padding:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.room-code{font-size:1em;font-weight:700;letter-spacing:2px;color:var(--red);cursor:pointer}
.pills{display:flex;gap:6px}
.pill{padding:4px 10px;border-radius:20px;font-size:.75em;font-weight:600}
.pill-red{background:rgba(255,68,68,.2);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.pill-pink{background:rgba(255,136,136,.2);color:var(--pink);border:1px solid rgba(255,136,136,.3)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--green);transition:background .3s}
.conn-dot.off{background:var(--red)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:.9em;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab-content{display:none;flex:1;overflow-y:auto;padding:12px}
.tab-content.active{display:flex;flex-direction:column}
.board-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1}
.board{display:grid;grid-template-columns:repeat(9,1fr);border:2px solid var(--red);border-radius:4px;overflow:hidden;width:100%;max-width:360px;background:var(--border)}
.cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4.5vw,22px);font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s;user-select:none}
.cell:nth-child(3n){border-right:2px solid var(--red)}.cell:nth-child(9n){border-right:none}
.cell:nth-child(n+73){border-bottom:none}
.cell:nth-child(n+19):nth-child(-n+27),.cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid var(--red)}
.cell.given{color:var(--given);font-weight:700}
.cell.selected{background:rgba(255,68,68,.25)!important;box-shadow:inset 0 0 0 2px var(--red)}
.cell.highlight{background:rgba(255,68,68,.08)}
.cell.same-num{background:rgba(255,68,68,.15)}
.cell.p1-fill{color:var(--red);background:rgba(255,68,68,.12)}
.cell.p2-fill{color:var(--pink);background:rgba(255,136,136,.12)}
.cell.wrong{color:#ff2222!important;background:rgba(255,0,0,.15)!important}
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:360px;width:100%}
.num-btn{padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1.15em;font-weight:600;cursor:pointer;transition:all .15s}
.num-btn:hover{background:var(--surface2);border-color:var(--red)}.num-btn:active{transform:scale(.95)}
.progress-bar{width:100%;max-width:360px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--pink));border-radius:3px;transition:width .3s}
.progress-text{font-size:.75em;color:var(--text2);text-align:center}
.chat{flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding-bottom:8px}
.msg{display:flex;flex-direction:column;gap:2px;max-width:85%}.msg.self{align-self:flex-end}
.msg .bubble{padding:8px 12px;border-radius:14px;font-size:.9em;line-height:1.4;word-break:break-word}
.msg.p1 .bubble{background:rgba(255,68,68,.2);border:1px solid rgba(255,68,68,.3)}
.msg.p2 .bubble{background:rgba(255,136,136,.2);border:1px solid rgba(255,136,136,.3)}
.msg.system{align-self:center;font-size:.75em;color:var(--text2);font-style:italic;max-width:100%}
.msg .name{font-size:.7em;font-weight:600;padding:0 4px}
.msg.p1 .name{color:var(--red)}.msg.p2 .name{color:var(--pink)}
.chat-input{display:flex;gap:6px;padding:8px 0}
.chat-input input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.95em}
.chat-input input:focus{outline:none;border-color:var(--red)}
.chat-input button{padding:10px 16px;border-radius:20px;border:none;background:var(--red);color:#fff;font-weight:600;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.overlay-box{background:var(--surface);border:2px solid var(--red);border-radius:20px;padding:30px;text-align:center;max-width:340px;width:100%}
.overlay-box h2{color:var(--green);font-size:1.5em;margin-bottom:8px}
.overlay-box p{color:var(--text2);margin-bottom:20px}
.confetti{position:fixed;pointer-events:none;z-index:200;width:10px;height:10px;animation:cf 3s linear forwards}
@keyframes cf{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.waiting-box{text-align:center;padding:40px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.link-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;margin:16px 0;max-width:320px;width:100%}
.link-box .label{font-size:.8em;color:var(--text2);margin-bottom:8px}
.link-box .link{font-size:.75em;color:var(--red);word-break:break-all;font-family:monospace;background:var(--bg);padding:8px;border-radius:6px;cursor:pointer}
.link-box .hint{font-size:.7em;color:var(--text2);margin-top:6px}
.error-msg{color:var(--red);text-align:center;padding:20px;font-size:.9em}
</style>
</head>
<body>
<div id="splash" class="screen active">
  <h1>Sudoku Together</h1>
  <p>Cooperative Sudoku for two</p>
  <button class="btn" onclick="showScreen('name-select')">Play Together</button>
</div>
<div id="name-select" class="screen">
  <h2>Join Game</h2>
  <p>Choose your name</p>
  <div class="name-btns">
    <button class="name-btn" id="n1" onclick="pick(0)">
      <span class="dot dot-red"></span> sudu_mahaththaya
    </button>
    <button class="name-btn" id="n2" onclick="pick(1)">
      <span class="dot dot-pink"></span> sudu_nona
    </button>
  </div>
  <div class="join-row">
    <input id="room-in" placeholder="ROOM CODE" maxlength="6" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-sm" onclick="doJoin()">Join</button>
  </div>
  <button class="btn btn-outline" onclick="doHost()">Create Room</button>
</div>
<div id="waiting" class="screen">
  <div class="waiting-box">
    <div class="loader"></div>
    <h2 style="color:var(--red);margin-bottom:4px">Room: <span id="wc"></span></h2>
    <p style="color:var(--text2)">Share this link</p>
    <div class="link-box">
      <div class="label">Room Link</div>
      <div class="link" id="wl" onclick="copyText(this)">loading...</div>
      <div class="hint">Tap to copy, send to partner</div>
    </div>
    <p id="ws">Waiting for partner...</p>
    <p id="we" class="error-msg"></p>
  </div>
</div>
<div id="game" class="screen">
  <div class="topbar">
    <span class="room-code" id="rc" onclick="copyGameLink()"></span>
    <div class="pills" id="pp"></div>
    <div class="conn-dot" id="cd"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="tab('board')">Board</div>
    <div class="tab" onclick="tab('chat')">Chat</div>
  </div>
  <div id="tb" class="tab-content active">
    <div class="board-wrap">
      <div class="board" id="bd"></div>
      <div class="numpad" id="np"></div>
      <div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
      <div class="progress-text" id="pt">0 / 81</div>
    </div>
  </div>
  <div id="tc" class="tab-content">
    <div class="chat" id="ch"></div>
    <div class="chat-input">
      <input id="ci" placeholder="Type..." onkeydown="if(event.key==='Enter')sch()">
      <button onclick="sch()">Send</button>
    </div>
  </div>
</div>
<div class="overlay" id="wo">
  <div class="overlay-box">
    <h2>Puzzle Complete!</h2>
    <p>You solved it together!</p>
    <button class="btn" onclick="doRestart()">Play Again</button>
  </div>
</div>
<script>
const C='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function rc(){let c='';for(let i=0;i<6;i++)c+=C[Math.floor(Math.random()*C.length)];return c;}
function gp(){const b=Array.from({length:9},()=>Array(9).fill(0));fb(b);
  const p=b.map(r=>[...r]);const ps=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++)ps.push([r,c]);
  sh(ps);for(let i=0;i<40&&i<ps.length;i++){const[r,c]=ps[i];p[r][c]=0;}return{puzzle:p,solution:b};}
function fb(b){const e=fe(b);if(!e)return true;const[r,c]=e;const ns=[1,2,3,4,5,6,7,8,9];sh(ns);
  for(const n of ns){if(va(b,r,c,n)){b[r][c]=n;if(fb(b))return true;b[r][c]=0;}}return false;}
function fe(b){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(b[r][c]===0)return[r,c];return null;}
function va(b,r,c,n){for(let i=0;i<9;i++){if(b[r][i]===n)return false;if(b[i][c]===n)return false;}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;for(let i=br;i<br+3;i++)for(let j=bc;j<bc+3;j++)if(b[i][j]===n)return false;return true;}
function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

let S={slot:0,name:'',room:'',puzzle:null,sol:null,filled:{},chat:[],sel:null,peer:null,conn:null,host:false};

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function pick(i){S.slot=i;S.name=i===0?'sudu_mahaththaya':'sudu_nona';
  document.getElementById('n1').style.borderColor=i===0?'var(--red)':'var(--border)';
  document.getElementById('n2').style.borderColor=i===1?'var(--red)':'var(--border)';}

function pid(r){return'sudoku-together-'+r;}

function doHost(){
  if(!S.name){alert('Pick a name first');return;}
  const code=rc();S.room=code;S.host=true;S.slot=0;
  const{puzzle,solution}=gp();S.puzzle=puzzle;S.solution=solution;S.filled={};S.chat=[];
  const peer=new Peer(pid(code),{debug:1});S.peer=peer;
  peer.on('open',id=>{
    document.getElementById('wc').textContent=code;
    const link=location.origin+location.pathname+'#'+code;
    document.getElementById('wl').textContent=link;
    showScreen('waiting');
  });
  peer.on('connection',cn=>{setupConn(cn,true);});
  peer.on('error',e=>{
    console.error(e);document.getElementById('we').textContent='Error: '+e.type;
    if(e.type==='unavailable-id'){document.getElementById('we').textContent='Room code taken, try again';}
  });
  peer.on('disconnected',()=>{document.getElementById('cd').classList.add('off');});
}

function doJoin(){
  const code=document.getElementById('room-in').value.trim().toUpperCase();
  if(!code){alert('Enter room code');return;}
  if(!S.name){S.slot=1;S.name='sudu_nona';pick(1);}
  joinRoom(code);
}

function joinRoom(code){
  S.room=code;S.host=false;S.slot=1;
  const peer=new Peer({debug:1});S.peer=peer;
  peer.on('open',()=>{
    const cn=peer.connect(pid(code),{reliable:true});S.conn=cn;
    cn.on('open',()=>{
      cn.send({type:'join',name:S.name});
      setupConn(cn,false);
    });
    cn.on('error',()=>{alert('Cannot connect. Check code and try again.');showScreen('name-select');});
  });
  peer.on('error',()=>{alert('Connection error. Try again.');showScreen('name-select');});
}

function setupConn(cn,isHost){
  S.conn=cn;cn.on('data',d=>msg(d));cn.on('close',()=>{document.getElementById('cd').classList.add('off');});
  document.getElementById('cd').classList.remove('off');
  if(isHost){
    // Send game state to joiner
    setTimeout(()=>{cn.send({type:'init',puzzle:S.puzzle,solution:S.solution,filled:S.filled,chat:S.chat,hostName:S.name});startGame();},500);
  }
}

function msg(d){
  if(d.type==='init'){
    if(S.host)return; // host already has state
    S.puzzle=d.puzzle;S.solution=d.solution;S.filled=d.filled||{};S.chat=d.chat||[];
    startGame();
  }else if(d.type==='move'){
    S.filled=d.filled;renderBoard();highlight();updProg();
    if(d.status==='done')showWin();
  }else if(d.type==='chat'){
    S.chat=d.chat;renderChat();
  }else if(d.type==='restart'){
    S.puzzle=d.puzzle;S.solution=d.solution;S.filled=d.filled||{};S.chat=d.chat||{};S.sel=null;
    document.getElementById('wo').classList.remove('show');
    renderBoard();updProg();renderChat();
  }else if(d.type==='join'){
    // Host receives join
  }
}

function startGame(){
  showScreen('game');document.getElementById('rc').textContent=S.room;
  renderBoard();renderNumpad();renderChat();updProg();updPills();
}

function renderBoard(){
  const b=document.getElementById('bd');b.innerHTML='';
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const cl=document.createElement('div');cl.className='cell';cl.dataset.r=r;cl.dataset.c=c;
    const g=S.puzzle[r][c];const k=r+','+c;const f=S.filled[k];
    if(g){cl.textContent=g;cl.classList.add('given');}
    else if(f){cl.textContent=f.num;cl.classList.add(f.player===0?'p1-fill':'p2-fill');if(!f.correct)cl.classList.add('wrong');}
    cl.onclick=()=>{if(S.puzzle[r][c]===0){S.sel={r,c};highlight();}};
    b.appendChild(cl);
  }
}

function highlight(){
  document.querySelectorAll('.cell').forEach(cl=>{
    cl.classList.remove('selected','highlight','same-num');
    const r=+cl.dataset.r,c=+cl.dataset.c;
    if(S.sel){const sr=S.sel.r,sc=S.sel.c;
      if(r===sr&&c===sc)cl.classList.add('selected');
      else if(r===sr||c===sc||(Math.floor(r/3)===Math.floor(sr/3)&&Math.floor(c/3)===Math.floor(sc/3)))cl.classList.add('highlight');
      const sk=sr+','+sc;const sf=S.filled[sk];const sg=S.puzzle[sr][sc];const sn=sf?sf.num:sg;
      if(sn){const tk=r+','+c;const tf=S.filled[tk];const tg=S.puzzle[r][c];const tn=tf?tf.num:tg;if(tn===sn&&tn!==0)cl.classList.add('same-num');}
    }
  });
}

function renderNumpad(){
  const n=document.getElementById('np');n.innerHTML='';
  for(let i=1;i<=9;i++){const b=document.createElement('button');b.className='num-btn';b.textContent=i;b.onclick=()=>move(i);n.appendChild(b);}
  const e=document.createElement('button');e.className='num-btn';e.style.color='var(--yellow)';e.textContent='Erase';e.onclick=()=>move(0);n.appendChild(e);
}

function move(num){
  if(!S.sel)return;const{r,c}=S.sel;if(S.puzzle[r][c]!==0)return;
  const k=r+','+c;
  if(num===0){delete S.filled[k];}else{
    const ok=S.solution[r][c]===num;S.filled[k]={num,player:S.slot,ts:Date.now(),correct:ok};
  }
  let done=true;outer:for(let r2=0;r2<9;r2++)for(let c2=0;c2<9;c2++){
    if(S.puzzle[r2][c2]===0){const f=S.filled[r2+','+c2];if(!f||!f.correct){done=false;break outer;}}
  }
  if(S.conn&&S.conn.open)S.conn.send({type:'move',filled:S.filled,status:done?'done':'playing'});
  renderBoard();highlight();updProg();
  if(done)showWin();
}

function updProg(){
  let f=0,t=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(S.puzzle[r][c]===0){t++;const x=S.filled[r+','+c];if(x&&x.correct)f++;}}
  document.getElementById('pf').style.width=(t>0?Math.round(f/t*100):0)+'%';
  document.getElementById('pt').textContent=f+' / '+t+' cells';
}

function updPills(){
  const p=document.getElementById('pp');p.innerHTML='';
  const n=[S.host?S.name:'...',S.host?'...':S.name];
  n.forEach((nm,i)=>{const pl=document.createElement('span');pl.className='pill pill-'+(i===0?'red':'pink');pl.textContent=nm;p.appendChild(pl);});
}

function tab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');document.getElementById('t'+t[0]).classList.add('active');
}

function renderChat(){
  const c=document.getElementById('ch');c.innerHTML='';
  S.chat.forEach(m=>{
    if(m.slot===-1){const d=document.createElement('div');d.className='msg system';d.textContent=m.text;c.appendChild(d);}
    else{const d=document.createElement('div');d.className='msg '+(m.slot===S.slot?'self':'')+' p'+(m.slot+1);
      d.innerHTML='<span class="name">'+esc(m.name)+'</span><span class="bubble">'+esc(m.text)+'</span>';c.appendChild(d);}
  });c.scrollTop=c.scrollHeight;
}
function sch(){
  const inp=document.getElementById('ci');const t=inp.value.trim();if(!t)return;inp.value='';
  S.chat.push({slot:S.slot,name:S.name,text:t.slice(0,200),ts:Date.now()});
  if(S.conn&&S.conn.open)S.conn.send({type:'chat',chat:S.chat});
  renderChat();
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function showWin(){document.getElementById('wo').classList.add('show');
  const colors=['#ff4444','#ff8888','#ffcc44','#44ff88','#4488ff','#ff44ff'];
  for(let i=0;i<50;i++){setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'0';document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);},i*50);
  }
}

function doRestart(){
  if(S.host){
    const{puzzle,solution}=gp();S.puzzle=puzzle;S.solution=solution;S.filled={};S.sel=null;
    S.chat.push({slot:-1,name:'System',text:'New puzzle! Good luck together!',ts:Date.now()});
    if(S.conn&&S.conn.open)S.conn.send({type:'restart',puzzle,solution,filled:{},chat:S.chat});
    document.getElementById('wo').classList.remove('show');
    renderBoard();updProg();renderChat();
  }else{
    S.chat.push({slot:S.slot,name:S.name,text:'wants to play again!',ts:Date.now()});
    if(S.conn&&S.conn.open)S.conn.send({type:'chat',chat:S.chat});
    renderChat();
  }
}

function copyText(el){navigator.clipboard.writeText(el.textContent).catch(()=>{});el.style.color='var(--green)';setTimeout(()=>el.style.color='',1500);}
function copyGameLink(){navigator.clipboard.writeText(location.origin+location.pathname+'#'+S.room).catch(()=>{});}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('game').classList.contains('active'))return;
  const n=parseInt(e.key);if(n>=1&&n<=9)move(n);
  if(e.key==='Backspace'||e.key==='Delete')move(0);
  if(S.sel&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    let{r,c}=S.sel;
    if(e.key==='ArrowUp')r=Math.max(0,r-1);if(e.key==='ArrowDown')r=Math.min(8,r+1);
    if(e.key==='ArrowLeft')c=Math.max(0,c-1);if(e.key==='ArrowRight')c=Math.min(8,c+1);
    S.sel={r,c};highlight();
  }
});

// Auto-join from hash
window.addEventListener('load',()=>{
  const h=location.hash.slice(1).toUpperCase();
  if(h&&h.length===6){document.getElementById('room-in').value=h;showScreen('name-select');}
});
</script>
