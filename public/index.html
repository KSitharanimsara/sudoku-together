<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sudoku Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a0a0a;--surface:#2a1010;--surface2:#3a1515;--border:#4a1a1a;
  --red:#ff4444;--pink:#ff8888;--text:#f0e0e0;--text2:#c0a0a0;
  --given:#e0d0d0;--accent:#ff6666;--green:#44ff88;--yellow:#ffcc44;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* SPLASH */
#splash{align-items:center;justify-content:center;text-align:center;padding:20px}
#splash h1{font-size:2.2em;color:var(--red);margin-bottom:8px;text-shadow:0 0 30px rgba(255,68,68,.4)}
#splash p{color:var(--text2);margin-bottom:30px;font-size:1.1em}
.btn{background:var(--red);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:1.1em;cursor:pointer;font-weight:600;transition:all .2s}
.btn:hover{background:var(--accent);transform:scale(1.03)}
.btn:active{transform:scale(.97)}
.btn-pink{background:var(--pink);color:#1a0a0a}
.btn-outline{background:transparent;border:2px solid var(--red);color:var(--red)}
.btn-outline:hover{background:rgba(255,68,68,.1)}
.btn-sm{padding:8px 16px;font-size:.9em}

/* NAME SELECT */
#name-select{align-items:center;justify-content:center;padding:20px;text-align:center}
#name-select h2{color:var(--red);margin-bottom:8px;font-size:1.6em}
#name-select p{color:var(--text2);margin-bottom:24px}
.name-btns{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;width:100%;max-width:280px}
.name-btn{padding:16px;border-radius:14px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:1.15em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.name-btn:hover{border-color:var(--red);background:var(--surface2)}
.name-btn.selected{border-color:var(--red);background:rgba(255,68,68,.15)}
.name-btn .dot{width:14px;height:14px;border-radius:50%}
.dot-red{background:var(--red)}
.dot-pink{background:var(--pink)}
.join-row{display:flex;gap:8px;width:100%;max-width:280px;margin-bottom:16px}
.join-row input{flex:1;padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:1.1em;text-align:center;text-transform:uppercase;letter-spacing:3px}
.join-row input:focus{outline:none;border-color:var(--red)}

/* GAME */
#game{padding:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.room-code{font-size:1.1em;font-weight:700;letter-spacing:2px;color:var(--red);cursor:pointer}
.room-code:hover{text-decoration:underline}
.pills{display:flex;gap:6px}
.pill{padding:4px 10px;border-radius:20px;font-size:.75em;font-weight:600}
.pill-red{background:rgba(255,68,68,.2);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.pill-pink{background:rgba(255,136,136,.2);color:var(--pink);border:1px solid rgba(255,136,136,.3)}
.pill-gray{background:rgba(255,255,255,.08);color:var(--text2);border:1px solid var(--border)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:.9em;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab-content{display:none;flex:1;overflow-y:auto;padding:12px}
.tab-content.active{display:flex;flex-direction:column}

/* BOARD */
.board-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.board{display:grid;grid-template-columns:repeat(9,1fr);gap:0;border:2px solid var(--red);border-radius:4px;overflow:hidden;width:100%;max-width:360px;background:var(--border)}
.cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4.5vw,22px);font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s;user-select:none}
.cell:nth-child(3n){border-right:2px solid var(--red)}
.cell:nth-child(9n){border-right:none}
.cell:nth-child(n+73){border-bottom:none}
.cell:nth-child(n+19):nth-child(-n+27),
.cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid var(--red)}
.cell.given{color:var(--given);font-weight:700}
.cell.selected{background:rgba(255,68,68,.25)!important;box-shadow:inset 0 0 0 2px var(--red)}
.cell.highlight{background:rgba(255,68,68,.08)}
.cell.same-num{background:rgba(255,68,68,.15)}
.cell.p1-fill{color:var(--red);background:rgba(255,68,68,.12)}
.cell.p2-fill{color:var(--pink);background:rgba(255,136,136,.12)}
.cell.wrong{color:#ff2222!important;background:rgba(255,0,0,.15)!important}
.cell.hint{animation:hintPulse .6s ease}
@keyframes hintPulse{0%,100%{background:var(--surface)}50%{background:rgba(68,255,136,.3)}}

/* NUMPAD */
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:360px;width:100%}
.num-btn{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1.2em;font-weight:600;cursor:pointer;transition:all .15s}
.num-btn:hover{background:var(--surface2);border-color:var(--red)}
.num-btn:active{transform:scale(.95)}
.num-btn.erase-btn{color:var(--yellow);grid-column:span 2}

/* PROGRESS */
.progress-bar{width:100%;max-width:360px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--pink));border-radius:3px;transition:width .3s}
.progress-text{font-size:.8em;color:var(--text2);text-align:center}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:calc(100vh - 280px);padding-bottom:8px}
.msg{display:flex;flex-direction:column;gap:2px;max-width:85%}
.msg.self{align-self:flex-end}
.msg .bubble{padding:8px 12px;border-radius:14px;font-size:.9em;line-height:1.4;word-break:break-word}
.msg.p1 .bubble{background:rgba(255,68,68,.2);border:1px solid rgba(255,68,68,.3)}
.msg.p2 .bubble{background:rgba(255,136,136,.2);border:1px solid rgba(255,136,136,.3)}
.msg.system{align-self:center;font-size:.75em;color:var(--text2);font-style:italic}
.msg .name{font-size:.7em;font-weight:600;padding:0 4px}
.msg.p1 .name{color:var(--red)}
.msg.p2 .name{color:var(--pink)}
.chat-input{display:flex;gap:6px;padding:8px 0}
.chat-input input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.95em}
.chat-input input:focus{outline:none;border-color:var(--red)}
.chat-input button{padding:10px 16px;border-radius:20px;border:none;background:var(--red);color:#fff;font-weight:600;cursor:pointer}

/* WIN OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.overlay-box{background:var(--surface);border:2px solid var(--red);border-radius:20px;padding:30px;text-align:center;max-width:340px;width:100%}
.overlay-box h2{color:var(--green);font-size:1.6em;margin-bottom:8px}
.overlay-box p{color:var(--text2);margin-bottom:20px}
.overlay-box .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* CONFETTI */
.confetti{position:fixed;pointer-events:none;z-index:200;width:10px;height:10px;animation:confFall 3s ease-in forwards}
@keyframes confFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* WAITING */
.waiting-box{text-align:center;padding:40px 20px}
.waiting-box .loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-box p{color:var(--text2)}

/* CONNECTION */
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.conn-dot.off{background:var(--red)}

/* RESPONSIVE */
@media(max-width:360px){.cell{font-size:16px}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <h1>Sudoku Together</h1>
  <p>Cooperative Sudoku for two</p>
  <button class="btn" onclick="showScreen('name-select')">Play Together</button>
</div>

<!-- NAME SELECT -->
<div id="name-select" class="screen">
  <h2>Join Game</h2>
  <p>Choose your name or create a room</p>
  <div class="name-btns">
    <button class="name-btn" onclick="selectName('sudu_mahaththaya',0)">
      <span class="dot dot-red"></span> sudu_mahaththaya
    </button>
    <button class="name-btn" onclick="selectName('sudu_nona',1)">
      <span class="dot dot-pink"></span> sudu_nona
    </button>
  </div>
  <div class="join-row">
    <input id="room-input" placeholder="ROOM CODE" maxlength="6" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-sm" onclick="joinRoom()">Join</button>
  </div>
  <button class="btn btn-outline" onclick="createRoom()">Create New Room</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="topbar">
    <span class="room-code" id="room-display" onclick="copyCode()"></span>
    <div class="pills" id="player-pills"></div>
    <div class="conn-dot" id="conn-dot" title="Connection"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('board')">Board</div>
    <div class="tab" onclick="switchTab('chat')">Chat</div>
  </div>
  <div id="tab-board" class="tab-content active">
    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="numpad" id="numpad"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">0 / 81</div>
    </div>
  </div>
  <div id="tab-chat" class="tab-content">
    <div class="chat" id="chat"></div>
    <div class="chat-input">
      <input id="chat-msg" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="win-overlay">
  <div class="overlay-box">
    <h2>Puzzle Complete!</h2>
    <p>You solved it together!</p>
    <div class="btns">
      <button class="btn" onclick="requestRestart()">Play Again</button>
    </div>
  </div>
</div>

<script>
const API = ''; // same origin
let state = {
  room: null,
  slot: -1,
  name: '',
  puzzle: null,
  filled: {},
  players: [null, null],
  status: 'waiting',
  chat: [],
  selectedCell: null,
  pollTimer: null,
  lastChatLen: 0,
  restartReq: [],
};

// SCREENS
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// NAME SELECT
function selectName(name, slot) {
  state.name = name;
  state.slot = slot;
  document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
  event.target.closest('.name-btn').classList.add('selected');
  // If room code entered, join; else create
  const code = document.getElementById('room-input').value.trim();
  if (code) joinRoom();
  else createRoom();
}

async function createRoom() {
  if (!state.name) { alert('Select a name first'); return; }
  try {
    const r = await fetch(API + '/api/create', { method: 'POST' });
    const d = await r.json();
    state.room = d.code;
    state.puzzle = d.puzzle;
    // Auto-join as creator
    await doJoin(d.code, state.name, state.slot);
  } catch(e) { alert('Failed to create room: ' + e.message); }
}

async function joinRoom() {
  const code = document.getElementById('room-input').value.trim();
  if (!code) { alert('Enter room code'); return; }
  if (!state.name) { alert('Select a name first'); return; }
  await doJoin(code, state.name, state.slot);
}

async function doJoin(code, name, preferredSlot) {
  try {
    const r = await fetch(API + '/api/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, name }),
    });
    const d = await r.json();
    if (d.error) { alert(d.error); return; }
    state.room = d.room;
    state.slot = d.slot;
    state.name = d.name;
    state.puzzle = d.puzzle;
    state.filled = d.filled || {};
    state.players = d.players;
    state.status = d.status;
    state.chat = d.chat || [];
    state.lastChatLen = state.chat.length;
    state.restartReq = [];
    showScreen('game');
    initGame();
  } catch(e) { alert('Failed to join: ' + e.message); }
}

// GAME INIT
function initGame() {
  document.getElementById('room-display').textContent = state.room;
  renderBoard();
  renderNumpad();
  updatePills();
  updateProgress();
  renderChat();
  startPolling();
}

// BOARD
function renderBoard() {
  const b = document.getElementById('board');
  b.innerHTML = '';
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      const given = state.puzzle[r][c];
      const key = `${r},${c}`;
      const fill = state.filled[key];
      if (given) {
        cell.textContent = given;
        cell.classList.add('given');
      } else if (fill) {
        cell.textContent = fill.num;
        cell.classList.add(fill.player === 0 ? 'p1-fill' : 'p2-fill');
        if (!fill.correct) cell.classList.add('wrong');
      }
      cell.onclick = () => selectCell(r, c);
      b.appendChild(cell);
    }
  }
}

function selectCell(r, c) {
  if (state.puzzle[r][c] !== 0) return; // given cell
  state.selectedCell = { r, c };
  highlightCells();
}

function highlightCells() {
  document.querySelectorAll('.cell').forEach(cell => {
    cell.classList.remove('selected', 'highlight', 'same-num');
    const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
    if (state.selectedCell) {
      const sr = state.selectedCell.r, sc = state.selectedCell.c;
      if (r === sr && c === sc) cell.classList.add('selected');
      else if (r === sr || c === sc || (Math.floor(r / 3) === Math.floor(sr / 3) && Math.floor(c / 3) === Math.floor(sc / 3)))
        cell.classList.add('highlight');
      // Same number highlight
      const selKey = `${sr},${sc}`;
      const selFill = state.filled[selKey];
      const selGiven = state.puzzle[sr][sc];
      const selNum = selFill ? selFill.num : selGiven;
      if (selNum) {
        const thisKey = `${r},${c}`;
        const thisFill = state.filled[thisKey];
        const thisGiven = state.puzzle[r][c];
        const thisNum = thisFill ? thisFill.num : thisGiven;
        if (thisNum === selNum && thisNum !== 0) cell.classList.add('same-num');
      }
    }
  });
}

// NUMPAD
function renderNumpad() {
  const n = document.getElementById('numpad');
  n.innerHTML = '';
  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = i;
    btn.onclick = () => makeMove(i);
    n.appendChild(btn);
  }
  const erase = document.createElement('button');
  erase.className = 'num-btn erase-btn';
  erase.textContent = 'Erase';
  erase.onclick = () => makeMove(0);
  n.appendChild(erase);
}

async function makeMove(num) {
  if (!state.selectedCell) return;
  const { r, c } = state.selectedCell;
  if (state.puzzle[r][c] !== 0) return;
  try {
    const res = await fetch(API + '/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: state.room, row: r, col: c, num, slot: state.slot }),
    });
    const d = await res.json();
    if (d.error) return;
    state.filled = d.filled;
    state.status = d.status;
    renderBoard();
    highlightCells();
    updateProgress();
    if (d.status === 'done') showWin();
  } catch(e) { console.error(e); }
}

// PROGRESS
function updateProgress() {
  let filled = 0, total = 0;
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (state.puzzle[r][c] === 0) {
        total++;
        const f = state.filled[`${r},${c}`];
        if (f && f.correct) filled++;
      }
    }
  }
  const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${filled} / ${total} cells`;
}

// PILLS
function updatePills() {
  const p = document.getElementById('player-pills');
  p.innerHTML = '';
  state.players.forEach((pl, i) => {
    const pill = document.createElement('span');
    pill.className = 'pill ' + (i === 0 ? 'pill-red' : 'pill-pink');
    pill.textContent = pl ? pl.name : '...';
    p.appendChild(pill);
  });
}

// TABS
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
}

// CHAT
function renderChat() {
  const c = document.getElementById('chat');
  c.innerHTML = '';
  state.chat.forEach(m => {
    if (m.slot === -1) {
      const d = document.createElement('div');
      d.className = 'msg system';
      d.textContent = m.text;
      c.appendChild(d);
    } else {
      const d = document.createElement('div');
      d.className = 'msg ' + (m.slot === state.slot ? 'self' : '') + ' p' + (m.slot + 1);
      d.innerHTML = `<span class="name">${m.name}</span><span class="bubble">${esc(m.text)}</span>`;
      c.appendChild(d);
    }
  });
  c.scrollTop = c.scrollHeight;
}

async function sendChat() {
  const inp = document.getElementById('chat-msg');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  try {
    await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: state.room, slot: state.slot, text }),
    });
  } catch(e) { console.error(e); }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// POLLING
function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(poll, 1500);
  poll();
}

async function poll() {
  try {
    const r = await fetch(API + '/api/state?code=' + state.room);
    const d = await r.json();
    if (d.error) return;
    document.getElementById('conn-dot').classList.remove('off');

    // Update filled cells
    if (JSON.stringify(d.filled) !== JSON.stringify(state.filled)) {
      state.filled = d.filled;
      renderBoard();
      highlightCells();
      updateProgress();
    }

    state.players = d.players;
    state.status = d.status;
    updatePills();

    // Chat
    if (d.chat && d.chat.length !== state.lastChatLen) {
      state.chat = d.chat;
      state.lastChatLen = d.chat.length;
      renderChat();
    }

    // Win
    if (d.status === 'done') showWin();
    else document.getElementById('win-overlay').classList.remove('show');

    // Restart
    if (d.restartRequested) state.restartReq = d.restartRequested;
    if (d.puzzle !== state.puzzle && d.status === 'playing') {
      state.puzzle = d.puzzle;
      state.filled = d.filled || {};
      state.selectedCell = null;
      document.getElementById('win-overlay').classList.remove('show');
      renderBoard();
      updateProgress();
    }
  } catch(e) {
    document.getElementById('conn-dot').classList.add('off');
  }
}

// WIN
function showWin() {
  document.getElementById('win-overlay').classList.add('show');
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ff4444', '#ff8888', '#ffcc44', '#44ff88', '#4488ff', '#ff44ff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 40);
  }
}

// RESTART
async function requestRestart() {
  try {
    const r = await fetch(API + '/api/restart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: state.room, slot: state.slot }),
    });
    const d = await r.json();
    if (d.puzzle) {
      state.puzzle = d.puzzle;
      state.filled = d.filled || {};
      state.status = d.status;
      state.selectedCell = null;
      document.getElementById('win-overlay').classList.remove('show');
      renderBoard();
      updateProgress();
    }
  } catch(e) { console.error(e); }
}

// COPY CODE
function copyCode() {
  navigator.clipboard.writeText(state.room).catch(() => {});
  const el = document.getElementById('room-display');
  const orig = el.textContent;
  el.textContent = 'Copied!';
  setTimeout(() => el.textContent = orig, 1500);
}

// KEYBOARD
document.addEventListener('keydown', e => {
  if (state.status !== 'playing') return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= 9) makeMove(n);
  if (e.key === 'Backspace' || e.key === 'Delete') makeMove(0);
  // Arrow nav
  if (state.selectedCell && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    let { r, c } = state.selectedCell;
    if (e.key === 'ArrowUp') r = Math.max(0, r - 1);
    if (e.key === 'ArrowDown') r = Math.min(8, r + 1);
    if (e.key === 'ArrowLeft') c = Math.max(0, c - 1);
    if (e.key === 'ArrowRight') c = Math.min(8, c + 1);
    selectCell(r, c);
  }
});
</script>
</body>
</html>
